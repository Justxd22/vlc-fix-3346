<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Minimal fontconfig config for Android. Point fontconfig at the system font
  directories so libass can find Thai/Arabic/Hebrew/Devanagari fonts for
  codepoint fallback. Ship this in the APK (e.g. assets/) and at startup set
  FONTCONFIG_PATH to the directory containing it (see README).
-->
<fontconfig>
  <dir>/system/fonts</dir>
  <dir>/product/fonts</dir>
  <dir>/vendor/fonts</dir>
  <dir>/apex/com.android.i18n/etc/fonts</dir>

  <!-- Cache must be app-writable. With XDG_CACHE_HOME set to the app cache dir
       this resolves under it; the absolute fallback is for adb testing. -->
  <cachedir prefix="xdg">fontconfig</cachedir>
  <cachedir>/data/local/tmp/fontconfig</cachedir>

  <config>
    <rejectfont><pattern><patelt name="scalable"><bool>false</bool></patelt></pattern></rejectfont>
  </config>
</fontconfig>
